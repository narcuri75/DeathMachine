<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Honda The Other Side</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
  </head>
  <body data-mode="day">
    <a class="project-back" id="projectBack" href="../../../index.html#experiments">← Projects</a>

    <main class="player-shell">
      <section class="video-stage" aria-label="Honda The Other Side synced player">
        <video
          class="clip clip-day is-active"
          data-clip="day"
          preload="auto"
          playsinline
          poster=""
          src="Assets/Honda ＂The Other Side＂ Day .mp4"
        ></video>
        <video
          class="clip clip-night"
          data-clip="night"
          preload="auto"
          playsinline
          poster=""
          src="Assets/Honda ＂The Other Side＂ Night .mp4"
        ></video>

        <a
          class="donate-button"
          id="donateButton"
          href="https://buymeacoffee.com/nathanarcuri"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Donate with Buy Me a Coffee"
        >
          <svg class="button-icon" aria-hidden="true" viewBox="0 0 24 24">
            <path d="M19.5 12.6 12 20l-7.5-7.4a5 5 0 0 1 7.1-7.1l.4.4.4-.4a5 5 0 0 1 7.1 7.1Z"></path>
          </svg>
          <span>Pizza Me!</span>
        </a>

        <button class="center-play" id="centerPlay" type="button" aria-label="Play">
          <svg class="center-icon" aria-hidden="true" viewBox="0 0 24 24">
            <path d="m8 5 11 7-11 7V5Z"></path>
          </svg>
        </button>

        <div class="controls" aria-label="Video controls">
          <button class="icon-button" id="playToggle" type="button" aria-label="Play">
            <svg class="button-icon icon-play" aria-hidden="true" viewBox="0 0 24 24">
              <path d="m8 5 11 7-11 7V5Z"></path>
            </svg>
            <svg class="button-icon icon-pause" aria-hidden="true" viewBox="0 0 24 24">
              <path d="M8 5v14"></path>
              <path d="M16 5v14"></path>
            </svg>
          </button>

          <div class="timeline-wrap">
            <input id="timeline" class="timeline" type="range" min="0" max="1000" step="1" value="0" aria-label="Timeline">
          </div>

          <output class="time-readout" id="timeReadout" aria-live="off">0:00</output>

          <button class="icon-button switch-button" id="switchMode" type="button" aria-label="Switch day and night" title="Switch day and night (R)">
            <svg class="button-icon" aria-hidden="true" viewBox="0 0 24 24">
              <path d="M12 3a9 9 0 1 0 0 18 9 9 0 0 0 0-18Z"></path>
              <path d="M12 3v18"></path>
              <path d="M12 3a9 9 0 0 1 0 18"></path>
            </svg>
            <span class="key-hint" aria-hidden="true">R</span>
          </button>

          <div class="volume-control">
            <button class="icon-button volume-button" id="muteToggle" type="button" aria-label="Mute">
              <svg class="button-icon icon-volume" aria-hidden="true" viewBox="0 0 24 24">
                <path d="M11 5 6 9H3v6h3l5 4V5Z"></path>
                <path d="M16 9.5a4 4 0 0 1 0 5"></path>
                <path d="M19 7a8 8 0 0 1 0 10"></path>
              </svg>
              <svg class="button-icon icon-volume-muted" aria-hidden="true" viewBox="0 0 24 24">
                <path d="M11 5 6 9H3v6h3l5 4V5Z"></path>
                <path d="m17 9 4 4"></path>
                <path d="m21 9-4 4"></path>
              </svg>
            </button>
            <input id="volumeSlider" class="volume-slider" type="range" min="0" max="1" step="0.01" value="1" aria-label="Volume">
          </div>

          <button class="icon-button" id="fullscreenToggle" type="button" aria-label="Fullscreen">
            <svg class="button-icon icon-fullscreen" aria-hidden="true" viewBox="0 0 24 24">
              <path d="M8 3H5a2 2 0 0 0-2 2v3"></path>
              <path d="M16 3h3a2 2 0 0 1 2 2v3"></path>
              <path d="M8 21H5a2 2 0 0 1-2-2v-3"></path>
              <path d="M16 21h3a2 2 0 0 0 2-2v-3"></path>
            </svg>
          </button>
        </div>

        <p class="sr-only" id="modeStatus" aria-live="polite">Day mode</p>
      </section>
    </main>
  </body>
</html>
