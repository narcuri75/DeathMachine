<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NRA SPACE WARS</title>
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="page">
    <div class="site-frame wide-frame">
      <header class="header">
            <div class="page-title">NRA SPACE WARS</div>
            <a class="home-button" href="Index.html">Home</a>
          </header>



      <section class="content">
        <div class="flash-container" data-swf="swf/NRA SPACE WARS.swf">
          <div class="fallback">Loading Flash content...</div>
        </div>
      </section>

      <footer class="footer">&copy; <a href="Secret.html">Nathan Arcuri</a> <span>2008-2011 All Rights Reserved.</span></footer>
    </div>
  </main>

  <script src="https://unpkg.com/@ruffle-rs/ruffle" defer></script>
  <script>
    function loadRufflePlayer(container) {
      const swfUrl = container.getAttribute("data-swf");

      if (!window.RufflePlayer) {
        container.innerHTML = '<div class="fallback">Ruffle failed to load. Check your internet connection or use the self-hosted Ruffle package.</div>';
        return;
      }

      const ruffle = window.RufflePlayer.newest();
      const player = ruffle.createPlayer();

      container.innerHTML = "";
      container.appendChild(player);

      player.load({
        url: swfUrl,
        allowScriptAccess: true
      }).catch(() => {
        container.innerHTML = '<div class="fallback">Could not load ' + swfUrl + '. Make sure the SWF file exists at that path.</div>';
      });
    }

    window.addEventListener("load", () => {
      document.querySelectorAll("[data-swf]").forEach(loadRufflePlayer);
    });
  </script>
  <a href="../index.html#school"
    style="position:fixed;top:12px;left:12px;z-index:9999;padding:8px 14px;background:#111;color:#fff;border-radius:8px;text-decoration:none;font-weight:600;box-shadow:0 4px 12px rgba(0,0,0,.4);opacity:1;transition:opacity .6s ease;"
    onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.08'">←
    Projects</a>
  <script>
    window.addEventListener('load', function () {
      const link = document.querySelector('a[href="../index.html#school"]');
      setTimeout(function () {
        link.style.opacity = '0.08';
      }, 5000);
    });
  </script>
</body>
</html>
